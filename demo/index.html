<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>voice-realtime-sdk Demo</title>
    <style>
      :root {
        --bg: #e8eaed;
        --surface: #ffffff;
        --border: #dadce0;
        --text: #202124;
        --muted: #5f6368;
        --primary: #1a73e8;
        --primary-soft: #e8f0fe;
        --primary-hover: #1557b0;
        --danger: #d93025;
        --radius: 8px;
        --font: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        --bot-bubble: #f1f3f4;
        --user-bubble: #e8f0fe;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: var(--font);
        font-size: 14px;
        color: var(--text);
        background: var(--bg);
        line-height: 1.45;
      }
      .demo-shell {
        display: flex;
        gap: 20px;
        max-width: 1180px;
        margin: 0 auto;
        padding: 24px 16px 48px;
        align-items: flex-start;
      }
      .demo-main {
        flex: 1;
        min-width: 0;
      }
      .wrap-inner {
        max-width: 720px;
      }
      h1 {
        font-size: 1.25rem;
        font-weight: 600;
        margin: 0 0 8px;
      }
      .sub {
        color: var(--muted);
        font-size: 13px;
        margin-bottom: 20px;
      }
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 16px;
        margin-bottom: 16px;
      }
      .card h2 {
        font-size: 13px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--muted);
        margin: 0 0 12px;
      }
      label {
        display: block;
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 4px;
      }
      input[type='text'],
      input[type='password'] {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid var(--border);
        border-radius: 6px;
        font: inherit;
        margin-bottom: 12px;
      }
      input:focus {
        outline: 2px solid rgba(26, 115, 232, 0.35);
        outline-offset: 1px;
      }
      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        margin-top: 8px;
      }
      button {
        font: inherit;
        padding: 8px 14px;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: var(--surface);
        cursor: pointer;
      }
      button:hover:not(:disabled) {
        background: #f8f9fa;
      }
      button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      button.primary {
        background: var(--primary);
        color: #fff;
        border-color: var(--primary);
      }
      button.primary:hover:not(:disabled) {
        background: var(--primary-hover);
        border-color: var(--primary-hover);
      }
      button.danger {
        color: var(--danger);
        border-color: #fce8e6;
      }
      .log {
        font-family: ui-monospace, 'Cascadia Code', monospace;
        font-size: 12px;
        background: #1e1e1e;
        color: #d4d4d4;
        border-radius: 6px;
        padding: 12px;
        height: 220px;
        overflow: auto;
        white-space: pre-wrap;
        word-break: break-all;
      }
      .log .line {
        margin-bottom: 6px;
        border-bottom: 1px solid #333;
        padding-bottom: 6px;
      }
      .log .time {
        color: #858585;
      }
      .session {
        font-size: 12px;
        color: var(--muted);
        margin-top: 8px;
      }
      .session strong {
        color: var(--text);
        word-break: break-all;
      }
      .hint {
        font-size: 12px;
        color: var(--muted);
        margin-top: 12px;
      }

      .chat-panel {
        display: flex;
        flex-direction: column;
        width: 360px;
        flex-shrink: 0;
        max-height: calc(100vh - 48px);
        position: sticky;
        top: 24px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
        box-shadow: 0 1px 3px rgba(60, 64, 67, 0.12);
      }
      .chat-panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 14px;
        border-bottom: 1px solid var(--border);
        background: #fafafa;
      }
      .chat-panel-title {
        font-weight: 600;
        font-size: 15px;
      }
      .chat-panel-badge {
        font-size: 11px;
        padding: 2px 8px;
        border-radius: 999px;
        background: #e8eaed;
        color: var(--muted);
      }
      .chat-panel-badge.is-live {
        background: #e6f4ea;
        color: #137333;
      }
      .chat-messages {
        flex: 1;
        min-height: 320px;
        max-height: min(56vh, 520px);
        overflow-y: auto;
        padding: 14px 12px;
        background: linear-gradient(180deg, #fafafa 0%, #fff 24px);
        display: flex;
        flex-direction: column;
        align-items: stretch;
      }
      .chat-row {
        display: flex;
        width: 100%;
        gap: 10px;
        margin-bottom: 14px;
        align-items: flex-end;
        flex-shrink: 0;
      }
      .chat-row--bot {
        justify-content: flex-start;
        flex-direction: row;
      }
      .chat-row--user {
        justify-content: flex-end;
        flex-direction: row;
      }
      .chat-avatar {
        flex-shrink: 0;
        width: 32px;
        height: 32px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 600;
        color: #fff;
      }
      .chat-avatar--bot {
        background: linear-gradient(145deg, #5f6368, #3c4043);
      }
      .chat-avatar--user {
        background: linear-gradient(145deg, var(--primary), #174ea6);
      }
      .chat-bubble {
        max-width: min(78%, calc(100% - 48px));
        padding: 10px 12px;
        border-radius: 14px;
        font-size: 14px;
        line-height: 1.5;
        word-break: break-word;
        min-width: 0;
      }
      .chat-bubble--bot {
        background: var(--bot-bubble);
        color: var(--text);
        border-bottom-left-radius: 4px;
      }
      .chat-bubble--user {
        background: var(--user-bubble);
        color: var(--text);
        border-bottom-right-radius: 4px;
        border: 1px solid rgba(26, 115, 232, 0.15);
      }
      .chat-system {
        text-align: center;
        font-size: 12px;
        color: var(--muted);
        margin: 8px 0;
        padding: 4px 8px;
      }
      .chat-system code {
        font-size: 11px;
        background: #f1f3f4;
        padding: 2px 6px;
        border-radius: 4px;
      }
      .chat-action {
        display: flex;
        align-items: center;
        justify-content: center;
        flex-wrap: wrap;
        gap: 8px;
        margin: 8px 0;
        padding: 9px 12px;
        font-size: 12px;
        line-height: 1.4;
        border-radius: 8px;
        background: #e8f0fe;
        border: 1px solid #aecbfa;
        color: #174ea6;
      }
      .chat-action-mark {
        flex-shrink: 0;
        font-weight: 600;
        font-size: 11px;
        letter-spacing: 0.06em;
        opacity: 0.9;
      }
      .chat-action-body {
        text-align: center;
      }
      .chat-action--server {
        background: #f3e8fd;
        border-color: #d7aefb;
        color: #5f2d8f;
      }
      .chat-panel-hint {
        font-size: 11px;
        color: var(--muted);
        padding: 8px 14px 12px;
        border-top: 1px solid var(--border);
        margin: 0;
        background: #fafafa;
      }

      @media (max-width: 960px) {
        .demo-shell {
          flex-direction: column;
        }
        .chat-panel {
          width: 100%;
          max-height: none;
          position: static;
        }
        .chat-messages {
          max-height: 420px;
        }
      }
    </style>
  </head>
  <body>
    <div class="demo-shell">
      <div class="demo-main">
        <div class="wrap-inner">
          <h1>Voice Realtime SDK 演示</h1>
          <p class="sub">
            需 HTTPS 或 localhost 以便采集麦克风。
            <strong>pnpm demo</strong>
          </p>

          <div class="card">
            <h2>鉴权与参数</h2>
            <label for="robotKey">Robot-Key</label>
            <input id="robotKey" type="text" autocomplete="off" placeholder="robot-key" />

            <label for="robotToken">Robot-Token</label>
            <input id="robotToken" type="password" autocomplete="off" placeholder="robot-token" />

            <label for="userName">user_name（可选，留空则自动生成）</label>
            <input id="userName" type="text" autocomplete="off" placeholder="user_xxx 或留空" />

            <label for="engineId">expected_engine_id（可选，对应业务 Agent）</label>
            <input id="engineId" type="text" autocomplete="off" placeholder="Agent / engine id" />

            <div class="row">
              <button type="button" id="btnStart" class="primary">开始语音</button>
              <button type="button" id="btnStop" disabled>结束会话</button>
              <button type="button" id="btnMute" disabled>静音</button>
              <button type="button" id="btnUnmute" disabled>取消静音</button>
              <button type="button" id="btnInterrupt" disabled>打断</button>
            </div>
            <p class="session" id="sessionLine" hidden>
              当前 sessionId（room_name）：<strong id="sessionIdText"></strong>
            </p>
          </div>

          <div class="card">
            <h2>事件日志</h2>
            <div class="log" id="logBox"></div>
            <div class="row">
              <button type="button" id="btnClear">清空日志</button>
            </div>
            <p class="hint">
              start → 订阅事件；挂断对应 stopVoiceChat；麦克风对应
              setAudioEnabled；打断对应 interrupt。右侧为字幕式对话区。
            </p>
          </div>
        </div>
      </div>

      <aside class="chat-panel" id="chatPanel" aria-hidden="false">
        <div class="chat-panel-header">
          <span class="chat-panel-title">对话字幕</span>
          <span class="chat-panel-badge" id="chatStatusBadge">未连接</span>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <p class="chat-panel-hint">
          助手左、用户右。蓝色条为本地操作（静音/取消静音/打断）；紫色条为服务端流式事件。
        </p>
      </aside>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
